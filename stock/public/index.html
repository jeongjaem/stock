<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <main class="page">
      <section class="hero">
        <p class="eyebrow">24H Market Pulse</p>
        <h1>주식과 코인 가격을 한 화면에서 실시간 추적</h1>
        <p class="hero-copy">
          코인은 Coinbase 실시간 스트림으로 받고, 미국 주식은 서버가 공개 피드를
          주기적으로 조회해 한곳에서 보여줍니다.
        </p>
        <div class="status-bar">
          <span id="cryptoStatus" class="pill">Crypto: 연결 중</span>
          <span id="stockStatus" class="pill">Stocks: 대기 중</span>
          <span class="pill">기본 포트: 8000</span>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Crypto</p>
              <h2>실시간 코인</h2>
            </div>
            <p class="panel-note">Coinbase WebSocket</p>
          </div>
          <div id="cryptoGrid" class="ticker-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Stocks</p>
              <h2>미국 주식</h2>
            </div>
            <p class="panel-note">서버 5초 간격</p>
          </div>
          <div id="stockGrid" class="ticker-grid"></div>
        </div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-head">
          <div>
            <p class="symbol"></p>
            <h3 class="name"></h3>
          </div>
          <span class="market-tag"></span>
        </div>
        <p class="price"></p>
        <p class="meta"></p>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
