<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <main class="page">
      <section class="hero">
        <p class="eyebrow">24H Market Pulse</p>
        <h1>주식과 코인을 더 빠르고 직관적으로 추적</h1>
        <p class="hero-copy">
          코인은 Coinbase 실시간 스트림으로 받고, 미국 주식은 짧은 주기로 반복 조회해
          더 빠르게 반응하도록 구성했습니다.
        </p>
        <div class="status-bar">
          <span id="cryptoStatus" class="pill">코인: 연결 중</span>
          <span id="stockStatus" class="pill">주식: 준비 중</span>
          <span class="pill">미니 차트: 켜짐</span>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Crypto</p>
              <h2>실시간 코인</h2>
            </div>
            <p class="panel-note">Coinbase WebSocket</p>
          </div>
          <div id="cryptoGrid" class="ticker-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Stocks</p>
              <h2>미국 주식</h2>
            </div>
            <p class="panel-note">고속 반복 조회</p>
          </div>
          <div id="stockGrid" class="ticker-grid"></div>
        </div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-head">
          <div>
            <p class="symbol"></p>
            <h3 class="name"></h3>
          </div>
          <span class="market-tag"></span>
        </div>
        <p class="price"></p>
        <div class="chart-wrap">
          <svg class="sparkline" viewBox="0 0 160 48" preserveAspectRatio="none" aria-hidden="true">
            <path class="sparkline-area"></path>
            <path class="sparkline-line"></path>
          </svg>
          <div class="chart-meta">
            <p class="chart-label">최근 흐름</p>
            <p class="chart-range"></p>
          </div>
        </div>
        <p class="meta"></p>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
