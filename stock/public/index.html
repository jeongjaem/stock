<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <main class="page">
      <section class="hero">
        <p class="eyebrow">24H Market Pulse</p>
        <h1>코인과 주식을 큰 1분봉 차트로 바로 보기</h1>
        <p class="hero-copy">
          각 시장마다 큰 TradingView 차트 하나를 두고, 종목 버튼으로 바로 전환할 수 있게
          구성했습니다. 코인과 미국 주식을 한 화면에서 빠르게 오갈 수 있습니다.
        </p>
        <div class="status-bar">
          <span class="pill">코인: 1분봉 기본</span>
          <span class="pill">주식: 1분봉 기본</span>
          <span class="pill">TradingView Advanced Chart</span>
        </div>
      </section>

      <section class="stack">
        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Crypto</p>
              <h2>실시간 코인</h2>
            </div>
            <p class="panel-note">Coinbase symbols</p>
          </div>
          <div id="cryptoButtons" class="symbol-bar"></div>
          <div class="tv-frame">
            <div id="cryptoChart" class="tv-host"></div>
          </div>
        </article>

        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Stocks</p>
              <h2>미국 주식</h2>
            </div>
            <p class="panel-note">NASDAQ symbols</p>
          </div>
          <div id="stockButtons" class="symbol-bar"></div>
          <div class="tv-frame">
            <div id="stockChart" class="tv-host"></div>
          </div>
        </article>
      </section>
    </main>

    <template id="symbolButtonTemplate">
      <button type="button" class="symbol-chip"></button>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
