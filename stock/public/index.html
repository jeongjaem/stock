<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <main class="page">
      <section class="hero">
        <p class="eyebrow">24H Market Pulse</p>
        <h1>트레이딩뷰 위젯으로 코인과 주식을 한 화면에서 보기</h1>
        <p class="hero-copy">
          차트는 TradingView 위젯으로 표시해 봉 마감과 분봉 갱신을 차트 엔진에 맡기고,
          우리는 한 화면에서 빠르게 보는 데 집중합니다.
        </p>
        <div class="status-bar">
          <span id="cryptoStatus" class="pill">코인: TradingView 위젯</span>
          <span id="stockStatus" class="pill">주식: TradingView 위젯</span>
          <span class="pill">기본 주기: 1분봉</span>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Crypto</p>
              <h2>실시간 코인</h2>
            </div>
            <p class="panel-note">TradingView Mini Symbol Overview</p>
          </div>
          <div id="cryptoGrid" class="widget-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Stocks</p>
              <h2>미국 주식</h2>
            </div>
            <p class="panel-note">TradingView Mini Symbol Overview</p>
          </div>
          <div id="stockGrid" class="widget-grid"></div>
        </div>
      </section>
    </main>

    <template id="widgetCardTemplate">
      <article class="widget-card">
        <div class="widget-card-head">
          <div>
            <p class="symbol"></p>
            <h3 class="name"></h3>
          </div>
          <span class="market-tag"></span>
        </div>
        <div class="tv-widget-shell">
          <div class="tradingview-widget-container widget-host"></div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
